<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인도 비자 신청서 작성 (India e-Visa Form)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.25rem;
        }

        .input-field {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background-color: #fff;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
        }

        .header-bg {
            background: linear-gradient(90deg, #ff9933 0%, #ffffff 50%, #138808 100%);
            height: 8px;
        }

        /* 인쇄 전용 스타일 */
        @media print {
            body {
                background-color: white;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            .section-card {
                box-shadow: none;
                border: 1px solid #eee;
                margin-bottom: 1rem;
                padding: 1rem;
                page-break-inside: avoid;
            }

            .max-w-4xl {
                max-width: 100%;
                width: 100%;
            }

            .input-field {
                border: none;
                border-bottom: 1px solid #ccc;
                border-radius: 0;
                padding: 0.2rem 0;
            }

            h1 {
                font-size: 1.5rem !important;
            }

            h2 {
                font-size: 1.1rem !important;
                margin-bottom: 0.5rem !important;
            }

            .grid {
                display: block;
            }

            .grid>div {
                margin-bottom: 0.75rem;
            }

            textarea.input-field {
                height: auto;
                min-height: 50px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function saveAsImage() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isMobile) {
                const btn = document.querySelector('.print-btn') || document.querySelector('button[onclick*="saveAsImage"]');
                if(btn) btn.style.display = 'none';
                
                document.querySelectorAll('input[type="text"], input[type="date"], input[type="tel"]').forEach(el => el.setAttribute('value', el.value));
                document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => {
                    if(el.checked) el.setAttribute('checked', 'checked');
                    else el.removeAttribute('checked');
                });
                document.querySelectorAll('textarea').forEach(el => el.innerHTML = el.value);

                const target = document.querySelector('.page') || document.querySelector('.form-container') || document.body;
                
                setTimeout(() => {
                    html2canvas(target, {scale: 2, useCORS: true}).then(canvas => {
                        const link = document.createElement('a');
                        link.download = 'application_form.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        alert("저장되었습니다! 스마트폰의 갤러리나 파일 앱에서 확인해주세요.");
                        if(btn) btn.style.display = '';
                    }).catch(e => {
                        console.error(e);
                        alert("저장에 실패했습니다. 화면을 캡쳐해주세요.");
                        if(btn) btn.style.display = '';
                    });
                }, 100);
            } else {
                window.print();
            }
        }
    </script>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-t-xl overflow-hidden shadow-sm mb-1">
            <div class="header-bg"></div>
            <div class="p-6 text-center">
                <h1 class="text-2xl font-bold text-gray-800">인도 비자 신청서 기재사항</h1>
                <p class="text-gray-500 mt-1">India e-Visa Application Form (2026)</p>
            </div>
        </div>

        <form id="visaForm">
            <!-- 1. 신청자 기본 정보 -->
            <div class="section-card">
                <h2 class="text-xl font-bold text-orange-600 mb-6 border-b pb-2">1. 신청자 기본 정보 (Personal Details)</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="input-label">성명 (영문/한글)</label>
                        <input type="text" name="name" class="input-field" placeholder="예: HONG GILDONG / 홍길동">
                    </div>
                    <div>
                        <label class="input-label">연락처 / 휴대폰</label>
                        <input type="tel" name="phone" class="input-field" placeholder="010-0000-0000">
                    </div>
                    <div>
                        <label class="input-label">이메일 주소</label>
                        <input type="email" name="email" class="input-field" placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="input-label">주민등록번호</label>
                        <input type="text" name="resident_no" class="input-field" placeholder="000000-0000000">
                    </div>
                    <div>
                        <label class="input-label">출생 도시 (태어난 곳)</label>
                        <input type="text" name="birth_city" class="input-field" placeholder="예: SEOUL">
                    </div>
                    <div>
                        <label class="input-label">종교</label>
                        <input type="text" name="religion" class="input-field"
                            placeholder="예: CHRISTIAN / BUDDHISM / NONE">
                    </div>
                    <div class="md:col-span-2">
                        <label class="input-label">최종 학력</label>
                        <input type="text" name="education" class="input-field"
                            placeholder="예: GRADUATE / POST GRADUATE">
                    </div>
                    <div class="md:col-span-2">
                        <label class="input-label">자택 주소 (우편번호 포함)</label>
                        <input type="text" name="address" class="input-field" placeholder="도로명 주소 및 우편번호">
                    </div>
                    <div class="md:col-span-2">
                        <label class="input-label">결혼 여부</label>
                        <div class="flex items-center space-x-4 mt-2">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="marital_status" value="single" class="w-4 h-4 text-orange-600"
                                    checked onchange="toggleSpouse(false)">
                                <span class="ml-2">미혼</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="marital_status" value="married"
                                    class="w-4 h-4 text-orange-600" onchange="toggleSpouse(true)">
                                <span class="ml-2">기혼</span>
                            </label>
                            <input type="text" id="spouse_name" name="spouse_name" class="input-field hidden"
                                style="width: 200px;" placeholder="배우자 성명">
                        </div>
                    </div>
                    <div>
                        <label class="input-label">부친 성명</label>
                        <input type="text" name="father_name" class="input-field">
                    </div>
                    <div>
                        <label class="input-label">모친 성명</label>
                        <input type="text" name="mother_name" class="input-field">
                    </div>
                </div>
            </div>

            <!-- 2. 직업 -->
            <div class="section-card">
                <h2 class="text-xl font-bold text-orange-600 mb-6 border-b pb-2">2. 직업 (Employment)</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="input-label">직장(학교)명 / 직급</label>
                        <input type="text" name="company_name" class="input-field">
                    </div>
                    <div>
                        <label class="input-label">직장 전화번호</label>
                        <input type="tel" name="company_phone" class="input-field">
                    </div>
                    <div class="md:col-span-2">
                        <label class="input-label">직장 주소</label>
                        <input type="text" name="company_address" class="input-field">
                    </div>
                </div>
            </div>

            <!-- 3. 인도 입출국 및 과거 기록 -->
            <div class="section-card">
                <h2 class="text-xl font-bold text-orange-600 mb-6 border-b pb-2">3. 인도 입출국 및 과거 기록 (Travel Details)</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="input-label">입국 예정일 / 출국 예정일</label>
                        <input type="text" name="travel_dates" class="input-field"
                            placeholder="예: 2026.04.01 - 2026.04.10">
                    </div>
                    <div>
                        <label class="input-label">입국 공항 / 출국 공항</label>
                        <input type="text" name="airports" class="input-field" placeholder="예: DEL / DEL">
                    </div>
                    <div class="md:col-span-2">
                        <label class="input-label">최근 10년 여행 국가</label>
                        <textarea name="visited_countries" class="input-field h-24"
                            placeholder="방문했던 국가들을 입력하세요."></textarea>
                    </div>
                    <div>
                        <label class="input-label">과거 인도비자 기록</label>
                        <div class="flex items-center space-x-4 mt-2">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="prev_visa" value="no" class="w-4 h-4" checked
                                    onchange="toggleVisaNo(false)">
                                <span class="ml-2">No</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="prev_visa" value="yes" class="w-4 h-4"
                                    onchange="toggleVisaNo(true)">
                                <span class="ml-2">Yes</span>
                            </label>
                            <input type="text" id="prev_visa_no" name="prev_visa_no" class="input-field hidden"
                                style="width: 200px;" placeholder="이전 비자번호">
                        </div>
                    </div>
                    <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label">국내 신원 보증인 성명</label>
                            <input type="text" name="ref_name" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">보증인 연락처</label>
                            <input type="tel" name="ref_phone" class="input-field">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. 목적별 체류 정보 -->
            <div class="section-card">
                <h2 class="text-xl font-bold text-orange-600 mb-6 border-b pb-2">4. 목적별 체류 정보 (Stay Details)</h2>
                <div class="mb-6 no-print">
                    <label class="input-label">방문 목적 선택</label>
                    <select id="visitPurpose" onchange="togglePurposeSections()"
                        class="input-field bg-orange-50 font-bold border-orange-200">
                        <option value="tourist">관광/방문 (Tourist)</option>
                        <option value="business">상용 목적 (Business)</option>
                    </select>
                </div>

                <!-- [선택 A] 관광/방문 -->
                <div id="sectionTourist" class="space-y-4">
                    <h3 class="font-bold text-gray-700">관광/방문 목적 시 (Tourist)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label">호텔(숙소)명 (영문)</label>
                            <input type="text" name="hotel_name" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">숙소 연락처</label>
                            <input type="tel" name="hotel_phone" class="input-field">
                        </div>
                        <div class="md:col-span-2">
                            <label class="input-label">숙소 주소</label>
                            <input type="text" name="hotel_address" class="input-field">
                        </div>
                    </div>
                </div>

                <!-- [선택 B] 상용 -->
                <div id="sectionBusiness" class="hidden space-y-4">
                    <h3 class="font-bold text-gray-700">상용 목적 시 (Business)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label">인도 현지 업체명</label>
                            <input type="text" name="biz_company" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">업체 웹사이트</label>
                            <input type="url" name="biz_web" class="input-field" placeholder="https://">
                        </div>
                        <div class="md:col-span-2">
                            <label class="input-label">업체 주소 및 연락처</label>
                            <input type="text" name="biz_contact" class="input-field">
                        </div>
                        <div class="md:col-span-2">
                            <label class="input-label">현지 체류지 정보 (호텔 등)</label>
                            <input type="text" name="biz_stay" class="input-field">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col md:flex-row gap-4 mb-10 no-print">
                <button type="button" onclick="saveToLocalStorage()"
                    class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">
                    브라우저에 임시 저장
                </button>
                <button type="button" onclick="saveAsImage()"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200 flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                        </path>
                    </svg>
                    인쇄하기 (A4)
                </button>
                <button type="button" onclick="downloadForm()"
                    class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200 flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    파일로 저장 (.txt)
                </button>
                <button type="button" onclick="resetForm()"
                    class="bg-red-50 hover:bg-red-100 text-red-600 font-medium py-3 px-6 rounded-lg transition duration-200 border border-red-200">
                    초기화
                </button>
            </div>
        </form>

        <div id="statusMsg"
            class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-full shadow-2xl transform transition-transform translate-y-24 no-print">
            성공적으로 저장되었습니다!
        </div>
    </div>

    <script>
        function toggleSpouse(show) {
            const spouseInput = document.getElementById('spouse_name');
            spouseInput.classList.toggle('hidden', !show);
        }

        function toggleVisaNo(show) {
            const visaInput = document.getElementById('prev_visa_no');
            visaInput.classList.toggle('hidden', !show);
        }

        function togglePurposeSections() {
            const purpose = document.getElementById('visitPurpose').value;
            document.getElementById('sectionTourist').classList.toggle('hidden', purpose !== 'tourist');
            document.getElementById('sectionBusiness').classList.toggle('hidden', purpose !== 'business');
        }

        function showToast(msg) {
            const toast = document.getElementById('statusMsg');
            toast.innerText = msg;
            toast.classList.remove('translate-y-24');
            setTimeout(() => {
                toast.classList.add('translate-y-24');
            }, 3000);
        }

        function saveToLocalStorage() {
            const formData = new FormData(document.getElementById('visaForm'));
            const data = {};
            formData.forEach((value, key) => { data[key] = value; });
            localStorage.setItem('india_visa_draft', JSON.stringify(data));
            showToast('데이터가 브라우저에 임시 저장되었습니다.');
        }

        window.onload = function () {
            const savedData = localStorage.getItem('india_visa_draft');
            if (savedData) {
                const data = JSON.parse(savedData);
                const form = document.getElementById('visaForm');

                Object.keys(data).forEach(key => {
                    const field = form.elements[key];
                    if (field) {
                        if (field.type === 'radio') {
                            if (field.value === data[key]) field.checked = true;
                            if (key === 'marital_status' && data[key] === 'married') toggleSpouse(true);
                            if (key === 'prev_visa' && data[key] === 'yes') toggleVisaNo(true);
                        } else {
                            field.value = data[key];
                        }
                    }
                });
                togglePurposeSections();
            }
        };

        function resetForm() {
            if (confirm('모든 입력 내용을 초기화하시겠습니까? 로컬 저장 데이터도 삭제됩니다.')) {
                document.getElementById('visaForm').reset();
                localStorage.removeItem('india_visa_draft');
                toggleSpouse(false);
                toggleVisaNo(false);
                togglePurposeSections();
                showToast('초기화되었습니다.');
            }
        }

        function downloadForm() {
            const form = document.getElementById('visaForm');
            const formData = new FormData(form);
            let text = "=== 인도 비자 신청서 기재사항 (2026) ===\n\n";

            const mapping = {
                "name": "성명 (영문/한글)",
                "phone": "연락처",
                "email": "이메일",
                "resident_no": "주민등록번호",
                "birth_city": "출생 도시",
                "religion": "종교",
                "education": "최종 학력",
                "address": "자택 주소",
                "marital_status": "결혼 여부",
                "spouse_name": "배우자 성명",
                "father_name": "부친 성명",
                "mother_name": "모친 성명",
                "company_name": "직장명/직급",
                "company_phone": "직장 전화번호",
                "company_address": "직장 주소",
                "travel_dates": "입/출국 일정",
                "airports": "입/출국 공항",
                "visited_countries": "최근 10년 여행 국가",
                "prev_visa": "과거 인도비자 여부",
                "prev_visa_no": "과거 비자번호",
                "ref_name": "국내 보증인",
                "ref_phone": "보증인 연락처",
                "hotel_name": "호텔명",
                "hotel_phone": "호텔 연락처",
                "hotel_address": "호텔 주소",
                "biz_company": "현지 업체명",
                "biz_web": "업체 웹사이트",
                "biz_contact": "업체 주소/연락처",
                "biz_stay": "현지 체류지"
            };

            formData.forEach((value, key) => {
                if (value && mapping[key]) {
                    text += `${mapping[key]}: ${value}\n`;
                }
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const name = formData.get('name') || '신청서';

            a.href = url;
            a.download = `인도비자신청_${name}_${timestamp}.txt`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>

</html>
